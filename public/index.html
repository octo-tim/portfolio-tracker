<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 포트폴리오 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#06090f;--bg2:#0c1219;--card:#111a27;--card2:#162032;--border:#1e2d42;--border2:#2a3d5a;--t1:#eaf0f9;--t2:#8fa3c0;--t3:#516480;--blue:#4d8eff;--blue-g:rgba(77,142,255,.1);--green:#2ee8a5;--green-g:rgba(46,232,165,.1);--red:#ff5c72;--red-g:rgba(255,92,114,.1);--amber:#ffb84d;--amber-g:rgba(255,184,77,.1);--purple:#a78bfa;--purple-g:rgba(167,139,250,.1);--cyan:#22d3ee;--cyan-g:rgba(34,211,238,.1)}html{font-size:14px}body{font-family:'Noto Sans KR','Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}.mono{font-family:'DM Mono',monospace}.hdr{padding:28px 36px 20px;background:linear-gradient(180deg,rgba(77,142,255,.04) 0%,transparent 100%);border-bottom:1px solid var(--border)}.hdr-row{display:flex;justify-content:space-between;align-items:center}.hdr h1{font-family:'Outfit',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px}.hdr h1 em{font-style:normal;color:var(--blue);font-weight:800}.hdr-sub{font-size:12px;color:var(--t3);margin-top:3px}.badge{background:var(--blue-g);border:1px solid rgba(77,142,255,.2);color:var(--blue);font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;font-family:'Outfit'}.sum-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:20px 36px}.sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}.sum-card:hover{border-color:var(--border2);transform:translateY(-1px)}.sum-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}.sc1::after{background:var(--blue)}.sc2::after{background:var(--green)}.sc3::after{background:var(--amber)}.sc4::after{background:var(--purple)}.sc5::after{background:var(--cyan)}.sl{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}.sv{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;letter-spacing:-.3px}.ss{font-size:11px;margin-top:5px;font-weight:500;display:flex;align-items:center;gap:4px}.up{color:var(--green)}.dn{color:var(--red)}.tabs{display:flex;gap:0;padding:0 36px;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto}.tab{padding:13px 20px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}.tab:hover{color:var(--t2)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}.content{padding:24px 36px 60px}.pane{display:none}.pane.on{display:block}.tw{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px}.ch{padding:14px 22px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15)}.cd{width:10px;height:10px;border-radius:3px}table{width:100%;border-collapse:collapse}thead th{padding:11px 18px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;text-align:right;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15)}thead th:first-child{text-align:center;width:36px}thead th:nth-child(2){text-align:left}tbody td{padding:12px 18px;font-size:13px;text-align:right;border-bottom:1px solid rgba(30,45,66,.4)}tbody td:first-child{text-align:center;color:var(--t3);font-size:11px;width:36px}tbody td:nth-child(2){text-align:left;font-weight:500}tbody tr:hover{background:var(--card2)}tbody tr:last-child td{border-bottom:none}.am{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:-.2px}.bc{width:100px}.bo{width:100%;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}.bi{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.23,1,.32,1)}.fr td{font-weight:700!important;background:rgba(77,142,255,.03);border-top:2px solid var(--border)}.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}.cc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}.cc.full{grid-column:1/-1}.ct{font-size:13px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}.dw{display:flex;align-items:center;gap:28px}.lg{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;flex:1}.li{display:flex;align-items:center;gap:7px;font-size:11px}.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}.ln{color:var(--t2);flex:1}.lp{font-family:'DM Mono',monospace;font-weight:500;color:var(--t1)}.fc{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px;padding:18px 22px;background:var(--card);border:1px solid var(--border);border-radius:14px}.fg{display:flex;flex-direction:column;gap:4px}.fg label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}.fg input,.fg select{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-size:12px;font-family:'DM Mono',monospace;outline:none;transition:border-color .15s}.fg input:focus,.fg select:focus{border-color:var(--blue)}.fg select option{background:var(--bg)}.btn{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:'Noto Sans KR',sans-serif}.bp{background:var(--blue);color:#fff}.bp:hover{background:#3a7aee}.bo2{background:transparent;border:1px solid var(--border);color:var(--t2)}.bo2:hover{border-color:var(--blue);color:var(--blue)}.bd{background:var(--red-g);color:var(--red);border:1px solid rgba(255,92,114,.2)}.bd:hover{background:rgba(255,92,114,.2)}.bg{background:var(--green-g);color:var(--green);border:1px solid rgba(46,232,165,.2)}.bg:hover{background:rgba(46,232,165,.2)}.ba{background:var(--amber-g);color:var(--amber);border:1px solid rgba(255,184,77,.2)}.ba:hover{background:rgba(255,184,77,.2)}.em{text-align:center;padding:40px;color:var(--t3);font-size:13px}.cw{position:relative;width:100%;height:320px}.cw canvas{width:100%;height:100%}.tg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px}.ti{background:var(--green-g);color:var(--green);border:1px solid rgba(46,232,165,.15)}.to{background:var(--red-g);color:var(--red);border:1px solid rgba(255,92,114,.15)}.lb{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;background:var(--purple-g);color:var(--purple);border:1px solid rgba(167,139,250,.15);margin-left:4px}.nb{font-size:11px;color:var(--t2);padding:10px 16px;background:rgba(77,142,255,.04);border-radius:8px;margin-bottom:16px;border-left:3px solid var(--blue);line-height:1.7}.nb b{color:var(--t1)}.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.sb{padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px}.sb .sl{margin-bottom:4px}.sb .sv{font-size:16px}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:min(520px,90vw);max-height:80vh;overflow-y:auto}.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}.modal-close{margin-left:auto;cursor:pointer;color:var(--t3);font-size:18px;background:none;border:none;padding:4px 8px}.modal-close:hover{color:var(--t1)}.mgr{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}.mgr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px}.mgr-item .cd{flex-shrink:0}.mgr-item span{flex:1}.mgr-add{display:flex;gap:8px;margin-top:8px}.mgr-add input{flex:1}@media(max-width:1100px){.sum-grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:900px){.sum-grid{grid-template-columns:1fr 1fr}.cg{grid-template-columns:1fr}.hdr,.content,.tabs,.sum-grid{padding-left:18px;padding-right:18px}.dw{flex-direction:column}.sr{grid-template-columns:1fr 1fr}}@media(max-width:600px){.sum-grid{grid-template-columns:1fr}.fc{flex-direction:column}.fg{width:100%}.sr{grid-template-columns:1fr}}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.sum-card,.cc,.tw{animation:fadeUp .45s ease forwards}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-row"><div><h1>Portfolio <em>Tracker</em></h1><div class="hdr-sub" id="hdrDate"></div></div><div style="display:flex;gap:8px;align-items:center"><button class="btn ba" onclick="openMgr()" style="font-size:11px">⚙ 자산 관리</button><div class="badge">● PORTFOLIO</div></div></div></div>
<div class="sum-grid" id="sumGrid"></div>
<div class="tabs" id="tabBar"></div>
<div class="content" id="mainContent"></div>
<div id="modalRoot"></div>
<script src="app.js"></script>
</body>
</html>
